<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>FB Tool Manager</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    width: 600px;
    margin: auto;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.account {
    background: #1e293b;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>
<div class="container">
    <h2>Quản lý nhiều nick Facebook</h2>

    <input id="username" placeholder="Email / SĐT">
    <input id="password" placeholder="Password">
    <button onclick="addAccount()">Thêm nick</button>

    <div id="list"></div>
</div>

<script>
async function addAccount() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    await fetch("/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username: u, password: p})
    });

    loadAccounts();
}

async function loadAccounts() {
    let res = await fetch("/accounts");
    let data = await res.json();

    let html = "";
    data.forEach(acc => {
        html += `
        <div class="account">
            ${acc.username}
            <button onclick="run('${acc.username}')">Chạy</button>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

async function run(username) {
    await fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username})
    });
}

loadAccounts();
</script>
</body>
</html>
