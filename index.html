<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tool cắt ảnh theo ảnh mẫu</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }
    canvas {
      border: 2px solid #00eaff;
      margin-top: 10px;
      cursor: grab;
    }
    input {
      margin: 6px;
    }
  </style>
</head>
<body>

<h2>Tool cắt ảnh theo ảnh mẫu</h2>

<input type="file" id="sourceImg" accept="image/*">
<br>
<input type="file" id="targetImg" accept="image/*">
<br>

<canvas id="canvas"></canvas>
<br>
<button onclick="exportImage()">Xuất ảnh</button>
<a id="download"></a>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let srcImg = new Image();
let scale = 1, offsetX = 0, offsetY = 0;
let isDragging = false, startX, startY;
let ratio = 3/4;

document.getElementById("targetImg").onchange = e => {
  let img = new Image();
  img.onload = () => {
    ratio = img.width / img.height;
    canvas.height = 450;
    canvas.width = canvas.height * ratio;
    draw();
  };
  img.src = URL.createObjectURL(e.target.files[0]);
};

document.getElementById("sourceImg").onchange = e => {
  srcImg.onload = draw;
  srcImg.src = URL.createObjectURL(e.target.files[0]);
};

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let w = srcImg.width * scale;
  let h = srcImg.height * scale;
  ctx.drawImage(srcImg, offsetX, offsetY, w, h);
}

canvas.onmousedown = e => {
  isDragging = true;
  startX = e.offsetX;
  startY = e.offsetY;
};

canvas.onmousemove = e => {
  if (!isDragging) return;
  offsetX += e.offsetX - startX;
  offsetY += e.offsetY - startY;
  startX = e.offsetX;
  startY = e.offsetY;
  draw();
};

canvas.onmouseup = () => isDragging = false;
canvas.onwheel = e => {
  scale += e.deltaY * -0.001;
  scale = Math.max(0.2, Math.min(scale, 5));
  draw();
};

function exportImage() {
  let link = document.getElementById("download");
  link.download = "crop.png";
  link.href = canvas.toDataURL("image/png");
  link.textContent = "Tải ảnh";
}
</script>

</body>
</html>
