<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>N-Queens Final Result</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
    }

    #board {
        margin: 20px auto;
        display: grid;
        gap: 2px;
        width: fit-content;
    }

    .cell {
        width: 50px;
        height: 50px;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .white { background: #eee; }
    .black { background: #555; color: white; }

    button, input {
        padding: 8px;
        margin: 5px;
    }
</style>
</head>

<body>

<h2>👑 Bài toán N quân hậu (chỉ hiển thị kết quả)</h2>

<input type="number" id="n" value="4" min="4">
<button onclick="start()">Giải</button>

<div id="board"></div>

<script>
let n, board, a;

function createBoard() {
    board.innerHTML = "";
    board.style.gridTemplateColumns = `repeat(${n}, 50px)`;

    for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
            let cell = document.createElement("div");
            cell.className = "cell " + ((i + j) % 2 === 0 ? "white" : "black");
            cell.id = i + "-" + j;
            board.appendChild(cell);
        }
    }
}

function draw() {
    for (let i = 0; i < n; i++) {
        if (a[i] !== -1) {
            document.getElementById(i + "-" + a[i]).textContent = "♛";
        }
    }
}

function check(row, col) {
    for (let i = 0; i < row; i++) {
        if (a[i] === col || Math.abs(a[i] - col) === Math.abs(i - row))
            return false;
    }
    return true;
}

// chỉ tìm 1 nghiệm
function solve(row) {
    if (row === n) return true;

    for (let col = 0; col < n; col++) {
        if (check(row, col)) {
            a[row] = col;

            if (solve(row + 1)) return true;

            a[row] = -1;
        }
    }
    return false;
}

function start() {
    n = parseInt(document.getElementById("n").value);
    board = document.getElementById("board");

    a = new Array(n).fill(-1);

    createBoard();

    if (solve(0)) {
        draw(); // chỉ vẽ kết quả cuối
    } else {
        alert("Không có nghiệm!");
    }
}
</script>

</body>
</html>
