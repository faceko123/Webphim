<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Crop khung tự do</title>
<style>
  body {
    background:#111;
    color:#fff;
    font-family:Arial;
    text-align:center;
  }
  canvas {
    margin-top:10px;
    border:1px solid #444;
    cursor:default;
  }
</style>
</head>
<body>

<h2>Crop với khung di chuyển & resize</h2>
<input type="file" id="upload" accept="image/*"><br>

<canvas id="canvas" width="900" height="500"></canvas><br>

<button onclick="exportCrop()">Cắt ảnh</button>
<a id="download"></a>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let img = new Image();
let scale = 1;
let imgX = 0, imgY = 0;

let crop = { x:300, y:100, w:200, h:300 };
let mode = null;
let sx=0, sy=0;

document.getElementById("upload").onchange = e => {
  img.onload = () => {
    scale = Math.min(
      canvas.width / img.width,
      canvas.height / img.height
    );
    imgX = (canvas.width - img.width*scale)/2;
    imgY = (canvas.height - img.height*scale)/2;
    draw();
  };
  img.src = URL.createObjectURL(e.target.files[0]);
};

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img, imgX, imgY, img.width*scale, img.height*scale);

  // Crop frame
  ctx.strokeStyle = "#00eaff";
  ctx.lineWidth = 2;
  ctx.strokeRect(crop.x, crop.y, crop.w, crop.h);

  // Resize handles
  ctx.fillStyle = "#00eaff";
  const s = 6;
  ["tl","tr","bl","br"].forEach(p=>{
    const px = p.includes("r") ? crop.x+crop.w : crop.x;
    const py = p.includes("b") ? crop.y+crop.h : crop.y;
    ctx.fillRect(px-s,py-s,s*2,s*2);
  });
}

function hitCorner(x,y){
  const s=8;
  if (near(x,y,crop.x,crop.y)) return "tl";
  if (near(x,y,crop.x+crop.w,crop.y)) return "tr";
  if (near(x,y,crop.x,crop.y+crop.h)) return "bl";
  if (near(x,y,crop.x+crop.w,crop.y+crop.h)) return "br";
  if (inside(x,y,crop)) return "move";
  return null;
}

function near(x,y,px,py){return Math.abs(x-px)<8 && Math.abs(y-py)<8;}
function inside(x,y,r){return x>r.x&&y>r.y&&x<r.x+r.w&&y<r.y+r.h;}

canvas.onmousedown = e => {
  sx=e.offsetX; sy=e.offsetY;
  mode = hitCorner(sx,sy);
};

canvas.onmousemove = e => {
  if(!mode) return;
  let dx=e.offsetX-sx, dy=e.offsetY-sy;

  if(mode==="move"){ crop.x+=dx; crop.y+=dy; }
  if(mode==="tl"){ crop.x+=dx; crop.y+=dy; crop.w-=dx; crop.h-=dy;}
  if(mode==="tr"){ crop.y+=dy; crop.w+=dx; crop.h-=dy;}
  if(mode==="bl"){ crop.x+=dx; crop.w-=dx; crop.h+=dy;}
  if(mode==="br"){ crop.w+=dx; crop.h+=dy;}

  sx=e.offsetX; sy=e.offsetY;
  draw();
};

canvas.onmouseup = ()=>mode=null;
canvas.onmouseleave = ()=>mode=null;

// EXPORT
function exportCrop(){
  const out=document.createElement("canvas");
  out.width=crop.w;
  out.height=crop.h;
  const o=out.getContext("2d");

  o.drawImage(
    img,
    (crop.x-imgX)/scale,
    (crop.y-imgY)/scale,
    crop.w/scale,
    crop.h/scale,
    0,0,
    crop.w,crop.h
  );

  const link=document.getElementById("download");
  link.href=out.toDataURL("image/png");
  link.download="crop.png";
  link.textContent="⬇ Tải ảnh";
}
</script>

</body>
</html>
``
